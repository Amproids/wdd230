<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading</title>
    <meta name="author" content="Andrew Parry">
    <meta name="description" content="A page that lazy loads numerous images.">

    <link rel="stylesheet" href="styles/lazy-base.css">
</head>
<body>
    <header>
        <h1>Lazy Loading</h1>
    </header>
    <body>
        <img src="https://loremflickr.com/400/600/cat" alt="A cat" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/dog" alt="A dog" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/paris" alt="Paris" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/england" alt="England" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/america" alt="America" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/beaver" alt="A beaver" loading="lazy" width="400" height="600">
        <img src="https://loremflickr.com/400/600/man" alt="A man" loading="lazy" width="400" height="600">
    </body>
    <footer>
        <p id="copyright"></p>
        <p id="lastModified"></p>
    </footer>
    <script src="scripts/lazy-script.js"></script>
</body>
</html>
