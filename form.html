<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Parry - WDD 230 - Form</title>
    <meta name="description" content="The course assignment form page.">
    <meta name="author" content="Andrew Parry">

    <link rel="stylesheet" href="styles/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="icon" href="favicon.ico">
</head>
    <body>
        <header>
            <img src="images/profile.webp" alt="Andrew Parry profile picture">
            <h1>Andrew Parry</h1>
            <button id="menu"></button>
        </header>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="lesson03/chamber-site-plan.html">Site Plan</a>
            <a href="chamber/">Chamber</a>
            <a href="https://www.byui.edu/">BYU-Idavo</a>
            <a href="https://www.churchofjesuschrist.org/study/scriptures/bofm/moro/10?lang=eng&id=p33#p33">Scripture</a>
        </nav>
        <main>
            <form action="record.html">
                <fieldset>
                    <legend>Form</legend>
                    <label>*Username:<input type="text" id="username" name="username" required></label>
                    <label>*Password:<input type="password" id="password" name="password" required pattern="[a-zA-Z0-9]{8,}"></label>
                    <label>*Confirm Password:<input type="password" id="confirm-password" name="confirm-password" required pattern="[a-zA-Z0-9]{8,}"></label>
                    <label>*Email:<input type="email" id="email" name="email" placeholder="Your byui email address" title="A valid byui.edu email address." pattern="[a-zA-Z0-9_.\-]+@byui.edu" required></label>
                    <label for="rating">Rating:</label>
                    <div id="rangevalue">1</div>
                    <input type="range" id="rating" name="rating" min="1" max="10" step="1" value="1" list="rangevalues">
                    <datalist id="rangevalues">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </datalist>
                </fieldset>
                <input type="submit" value="Log In">
            </form>
        </main>
        <footer>
            <p id="copyright"></p>
            <p id="lastModified"></p>
        </footer>
        <script src="scripts/script.js"></script>
        <script src="scripts/form.js"></script>
    </body>
</html>
